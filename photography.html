<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photography</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="inner-body photography-body">
    <header class="fixed-header">
        <a href="index.html" class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </a>
        <nav class="nav-menu">
            <div class="current-page">PHOTOGRAPHY</div>
            <div class="dropdown-links">
                <a href="graphik.html">GRAPHIK</a>
                <a href="tattoo.html">TATTOO</a>
                <a href="branding.html">BRANDING</a>
                <a href="others.html">OTHERS</a>
                <a href="about.html">ABOUT</a>
            </div>
        </nav>
    </header>
    <main class="photo-grid" id="grid-container"></main>
    <footer class="fixed-footer">© 2025 Strangeways Apartments. All rights reserved.</footer>
    <script>
        const photoFolder = 'photography/';
        const imageFiles = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg', 'photo4.jpg']; // 填入四欄網格照片
        const gridContainer = document.getElementById('grid-container');
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }
        function loadPhotos() {
            shuffleArray([...imageFiles]).forEach(fileName => {
                const imgElement = document.createElement('img');
                imgElement.src = photoFolder + fileName;
                imgElement.onerror = function() { this.style.display = 'none'; };
                gridContainer.appendChild(imgElement);
            });
        }
        loadPhotos();
    </script>
</body>
</html>
