<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photography | Strangeways Apartments</title>
    <style>
        /* 1. 導入自訂字體 */
        @font-face {
            font-family: 'FHWA Series Emod 2024 plus50';
            src: url('fonts/FHWA-Series-Emod-2024-plus50.woff2') format('woff2'),
                 url('fonts/FHWA-Series-Emod-2024-plus50.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. 基礎重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000; /* 背景改為黑色，圖片載入前會有高級感 */
            font-family: 'FHWA Series Emod 2024 plus50', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            /* 注意：這裡移除了 padding-top，讓照片可以直接頂到螢幕最上方，在 Header 底下穿梭 */
        }

        /* 3. 頂部導覽列 (永遠固定在最上層) */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 999;
            pointer-events: none;
        }

        .logo-container {
            pointer-events: auto;
        }
        
        .logo-container img {
            height: 40px;
            width: auto;
            display: block;
        }

        /* 4. 右上角導覽選單 */
        .nav-menu {
            pointer-events: auto;
            text-align: right;
            position: relative;
        }

        .current-page {
            color: #ff0000;
            font-size: 28pt;
            letter-spacing: 2px;
            cursor: pointer;
            padding-bottom: 10px;
            /* 加入一點文字陰影，確保在複雜的照片背景上依然清晰可讀 */
            text-shadow: 0px 0px 10px rgba(255,255,255,0.7); 
        }

        .dropdown-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 10px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-15px);
            transition: all 0.3s ease;
        }

        .dropdown-links a {
            color: #0000ff;
            font-size: 28pt;
            text-decoration: none;
            letter-spacing: 2px;
            transition: color 0.2s ease;
            text-shadow: 0px 0px 10px rgba(255,255,255,0.7);
        }

        .dropdown-links a:hover {
            opacity: 0.7;
        }

        .nav-menu:hover .dropdown-links {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* 5. 底部鎖定文字 */
        .fixed-footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ff0000;
            font-size: 12pt;
            z-index: 999;
            pointer-events: none;
            font-family: sans-serif;
            text-shadow: 0px 0px 5px rgba(255,255,255,0.7);
        }

        /* 6. 滿版四欄照片網格 */
        .photo-grid {
            display: grid;
            /* 將畫面等分成 4 個直排 */
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            /* 讓網格之間沒有縫隙 */
            gap: 0; 
        }

        .photo-grid img {
            width: 100%;
            /* 強制設定為 1:1 正方形 (如果想要長方形可以改為 4/3 或 3/4) */
            aspect-ratio: 1 / 1; 
            /* 核心：自動取較窄一邊做基準切割多餘，不變形 */
            object-fit: cover; 
            display: block;
            transition: filter 0.3s ease;
        }

        /* 增加一點互動：滑鼠移上去時照片稍微提亮，其餘變暗 (可選) */
        .photo-grid img:hover {
            filter: brightness(1.1);
            z-index: 2;
            position: relative;
        }

        /* 響應式微調 */
        @media (max-width: 1024px) {
            /* 平板尺寸改為 3 欄 */
            .photo-grid { grid-template-columns: repeat(3, 1fr); }
            .current-page, .dropdown-links a { font-size: 24pt; }
        }
        
        @media (max-width: 767px) {
            /* 手機尺寸改為 2 欄，確保格子不會太小 */
            .photo-grid { grid-template-columns: repeat(2, 1fr); }
            .fixed-header { padding: 20px; }
            .current-page, .dropdown-links a { font-size: 20pt; }
            .logo-container img { height: 30px; }
        }
    </style>
</head>
<body>

    <!-- 永遠鎖在最上層的 Header -->
    <header class="fixed-header">
        <a href="index.html" class="logo-container">
            <!-- 替換為您的 logo -->
            <img src="logo.png" alt="Strangeways Apartments Logo">
        </a>

        <nav class="nav-menu">
            <div class="current-page">PHOTOGRAPHY</div>
            <div class="dropdown-links">
                <a href="graphik.html">GRAPHIK</a>
                <a href="tattoo.html">TATTOO</a>
                <a href="videos.html">VIDEOS</a>
                <a href="others.html">OTHERS</a>
                <a href="about.html">ABOUT</a>
            </div>
        </nav>
    </header>

    <!-- 滿版照片網格內容區塊 -->
    <main class="photo-grid" id="grid-container">
        <!-- 這裡的 <img> 會由下方的 JavaScript 動態隨機生成 -->
    </main>

    <!-- 永遠鎖在最下層的 Footer -->
    <footer class="fixed-footer">
        © 2025 Strangeways Apartments. All rights reserved.
    </footer>

    <!-- 7. 隨機載入照片的 JavaScript -->
    <script>
        // 【配置區域】：在此填入 photography 資料夾下的所有照片檔名
        const photoFolder = 'photography/';
        const imageFiles = [
            'photo1.jpg',
            'photo2.jpg',
            'photo3.jpg',
            'photo4.jpg',
            'photo5.jpg',
            'photo6.jpg',
            'photo7.jpg',
            'photo8.jpg',
            'photo9.jpg',
            'photo10.jpg',
            'photo11.jpg',
            'photo12.jpg'
            // 盡量放多一點照片，可以填滿畫面並產生滾動效果
        ];

        const gridContainer = document.getElementById('grid-container');

        // 洗牌演算法 (Fisher-Yates Shuffle)，用來打亂陣列順序
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // 載入照片到網格中
        function loadPhotos() {
            // 每次整理前先將照片打亂，達到「隨機填入」的效果
            const randomizedPhotos = shuffleArray([...imageFiles]);

            randomizedPhotos.forEach(fileName => {
                // 創建 img 標籤
                const imgElement = document.createElement('img');
                imgElement.src = photoFolder + fileName;
                imgElement.alt = 'Photography Work';
                
                // 為了避免圖片載入錯誤（例如檔名打錯），可以加上這行隱藏破圖
                imgElement.onerror = function() { this.style.display = 'none'; };

                // 將圖片塞入 HTML 的 grid 容器中
                gridContainer.appendChild(imgElement);
            });
        }

        // 執行載入
        loadPhotos();
    </script>
</body>
</html>
