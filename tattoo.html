<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tattoo | Strangeways Apartments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="inner-body">

    <header class="fixed-header">
        <a href="index.html" class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </a>
        <nav class="nav-menu">
            <div class="current-page">TATTOO</div>
            <div class="dropdown-links">
                <a href="graphik.html">GRAPHIK</a>
                <a href="photography.html">PHOTOGRAPHY</a>
                <a href="branding.html">BRANDING</a>
                <a href="others.html">OTHERS</a>
                <a href="videos.html">VIDEOS</a>
                <a href="about.html">ABOUT</a>
            </div>
        </nav>
    </header>

    <main class="grid-6-container" id="grid-container"></main>

    <div class="lightbox" id="lightbox">
        <img src="" id="lightbox-img" alt="Enlarged View" style="display: none;">
        <video id="lightbox-video" controls autoplay playsinline style="display: none; max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.1);"></video>
    </div>

    <footer class="fixed-footer">© 2025 Strangeways Apartments. All rights reserved.</footer>

    <script>
        const folderPath = 'tattoo/'; 
        const files = [
            'tattoo1.JPEG', 'tattoo2.PNG', 'tattoo3.JPEG', 'tattoo4.jpeg', 'tattoo5.jpeg',
            'tattoo6.jpeg', 'tattoo7.jpeg', 'tattoo8.PNG', 'tattoo9.PNG', 'tattoo10.PNG',
            'tattoo11.jpeg', 'tattoo12.jpg', 'tattoo13.jpeg', 'tattoo14.jpeg', 'tattoo15.jpeg',
            'tattoo16.jpeg', 'tattoo17.JPEG', 'tattoo18.JPEG', 'tattoo19.JPEG', 'tattoo20.MP4',
            'tattoo21.JPEG', 'tattoo22.JPEG', 'tattoo23.JPEG', 'tattoo24.JPEG', 'tattoo25.JPEG',
            'tattoo26.JPEG', 'tattoo27.JPEG', 'tattoo28.JPEG', 'tattoo29.JPEG'
        ];

        const gridContainer = document.getElementById('grid-container');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxVideo = document.getElementById('lightbox-video');

        files.forEach(file => {
            const fileExtension = file.split('.').pop().toLowerCase();
            
            if (fileExtension === 'mp4' || fileExtension === 'mov') {
                const video = document.createElement('video');
                video.src = folderPath + file;
                video.setAttribute('autoplay', 'true');
                video.setAttribute('loop', 'true');
                video.setAttribute('muted', 'true'); // 網格中保持靜音
                video.setAttribute('playsinline', 'true');
                video.style.cursor = 'zoom-in';
                
                video.addEventListener('click', () => {
                    lightboxImg.style.display = 'none';
                    lightboxVideo.style.display = 'block';
                    lightboxVideo.src = video.src;
                    lightboxVideo.muted = false; // 👈 放大時解除靜音！
                    lightbox.classList.add('active');
                });
                
                gridContainer.appendChild(video);
            } else {
                const imgElement = document.createElement('img');
                imgElement.src = folderPath + file;
                imgElement.setAttribute('loading', 'lazy'); 
                
                imgElement.addEventListener('click', () => {
                    lightboxVideo.style.display = 'none';
                    lightboxVideo.pause();
                    lightboxVideo.src = '';
                    lightboxImg.style.display = 'block';
                    lightboxImg.src = imgElement.src; 
                    lightbox.classList.add('active'); 
                });

                gridContainer.appendChild(imgElement);
            }
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightboxVideo) return;
            lightbox.classList.remove('active');
            lightboxVideo.pause();
            lightboxVideo.src = '';
        });
    </script>
</body>
</html>
