<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photography | Strangeways Apartments</title>
    <style>
        /* 1. 導入自訂字體 */
        @font-face {
            font-family: 'FHWA Series Emod 2024 plus50';
            src: url('fonts/FHWA-Series-Emod-2024-plus50.woff2') format('woff2'),
                 url('fonts/FHWA-Series-Emod-2024-plus50.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. 基礎重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff; /* 內頁背景改為白色 */
            font-family: 'FHWA Series Emod 2024 plus50', -apple-system, BlinkMacSystemFont, sans-serif;
            /* 讓內容區塊不會被上方 fixed 的 Header 和下方 Footer 蓋住 */
            padding-top: 120px; 
            padding-bottom: 80px; 
            overflow-x: hidden;
        }

        /* 3. 頂部導覽列 (永遠固定在最上層) */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 999; /* 確保在最上層 */
            pointer-events: none; /* 讓中間空白處可以點擊到下方的內容 */
        }

        /* 左上角 Logo */
        .logo-container {
            pointer-events: auto; /* 恢復可點擊狀態 */
        }
        
        .logo-container img {
            height: 40px; /* 請依據你的 PNG logo 實際比例調整高度 */
            width: auto;
            display: block;
        }

        /* 4. 右上角導覽選單 (Hover 下拉特效) */
        .nav-menu {
            pointer-events: auto; /* 恢復可點擊狀態 */
            text-align: right;
            position: relative;
        }

        .current-page {
            color: #ff0000; /* 當下頁面為紅色 */
            font-size: 28pt;
            letter-spacing: 2px;
            cursor: pointer;
            padding-bottom: 10px; /* 增加感應區塊，讓 hover 更好觸發 */
        }

        /* 隱藏的下拉選單 */
        .dropdown-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 10px;
            /* 預設隱藏並稍微往上偏移 */
            opacity: 0;
            visibility: hidden;
            transform: translateY(-15px);
            transition: all 0.3s ease; /* 平滑過渡動畫 */
        }

        .dropdown-links a {
            color: #0000ff; /* 其他頁面為藍色 */
            font-size: 28pt;
            text-decoration: none;
            letter-spacing: 2px;
            transition: color 0.2s ease;
        }

        .dropdown-links a:hover {
            opacity: 0.7; /* 增加一點點滑過的視覺反饋 */
        }

        /* 當滑鼠停留在 nav-menu 時，顯示下拉選單 */
        .nav-menu:hover .dropdown-links {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* 5. 底部鎖定文字 */
        .fixed-footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ff0000; /* 紅色文字 */
            font-size: 12pt;
            z-index: 999; /* 確保在最上層 */
            pointer-events: none; /* 防止干擾內容的點擊 */
            font-family: sans-serif; /* 依據圖片，這行字似乎是普通無襯線字體。如果要用特殊字體可改掉這行 */
        }

        /* 6. 網頁內容區塊 (滾動區域) */
        .content-area {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            /* 這裡放置你的作品集圖片與文字 */
            min-height: 150vh; /* 測試用高度，讓你看到滾動時 header/footer 鎖定的效果 */
        }
        
        /* 響應式微調 (手機版) */
        @media (max-width: 767px) {
            .fixed-header { padding: 20px; }
            .current-page, .dropdown-links a { font-size: 20pt; }
            .logo-container img { height: 30px; }
        }
    </style>
</head>
<body>

    <!-- 永遠鎖在最上層的 Header -->
    <header class="fixed-header">
        <!-- 左上角 Logo (請替換 src 路徑為你的 logo.png) -->
        <a href="index.html" class="logo-container">
            <img src="logo.png" alt="Strangeways Apartments Logo">
        </a>

        <!-- 右上角導覽選單 -->
        <nav class="nav-menu">
            <!-- 當下頁面 (紅色) -->
            <div class="current-page">PHOTOGRAPHY</div>
            
            <!-- 下拉選單 (藍色) -->
            <div class="dropdown-links">
                <a href="graphik.html">GRAPHIK</a>
                <a href="tattoo.html">TATTOO</a>
                <a href="videos.html">VIDEOS</a>
                <a href="others.html">OTHERS</a>
                <a href="about.html">ABOUT</a>
            </div>
        </nav>
    </header>

    <!-- 網頁主要內容 (會在這個區塊內滾動，不會蓋到 Header 和 Footer) -->
    <main class="content-area">
        <h1>這裡是內容區塊</h1>
        <p>當你往下滾動時，左上角的 Logo、右上角的選單，以及下方的版權宣告都會固定不動。</p>
        <!-- 這裡之後可以放入你的照片網格或文字介紹 -->
    </main>

    <!-- 永遠鎖在最下層的 Footer -->
    <footer class="fixed-footer">
        © 2025 Strangeways Apartments. All rights reserved.
    </footer>

</body>
</html>
