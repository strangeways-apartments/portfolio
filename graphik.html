<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Graphik | Strangeways Apartments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="inner-body">
    
    <header class="fixed-header">
        <a href="index.html" class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </a>
        <nav class="nav-menu">
            <div class="current-page">GRAPHIK</div>
            <div class="dropdown-links">
                <a href="photography.html">PHOTOGRAPHY</a>
                <a href="tattoo.html">TATTOO</a>
                <a href="branding.html">BRANDING</a>
                <a href="others.html">OTHERS</a>
                <a href="about.html">ABOUT</a>
            </div>
        </nav>
    </header>

    <!-- 修正 1：換成六宮格專用的 class 與 id -->
    <main class="grid-6-container" id="grid-container"></main>

    <!-- 修正 2：補上點擊放大的白底區塊 (Lightbox) -->
    <div class="lightbox" id="lightbox">
        <img src="" id="lightbox-img" alt="Enlarged View">
    </div>

    <footer class="fixed-footer">© 2025 Strangeways Apartments. All rights reserved.</footer>
    
    <!-- 載入圖片與放大功能的 JS -->
    <script>
        const folderPath = 'portfolio/graphik/'; 
        
        const images = [
            'vt-portfolio-graphik-web-01.jpeg',
            'vt-portfolio-graphik-web-02.jpeg',
            'vt-portfolio-graphik-web-03.jpeg',
            'vt-portfolio-graphik-web-04.jpeg',
            'vt-portfolio-graphik-web-05.jpeg',
            'vt-portfolio-graphik-web-06.jpeg',
            'vt-portfolio-graphik-web-07.jpeg',
            'vt-portfolio-graphik-web-08.jpeg',
            'vt-portfolio-graphik-web-09.jpeg',
            'vt-portfolio-graphik-web-10.jpeg',
            'vt-portfolio-graphik-web-11.jpeg',
            'vt-portfolio-graphik-web-12.jpeg',
            'vt-portfolio-graphik-web-13.jpeg',
            'vt-portfolio-graphik-web-14.jpeg',
            'vt-portfolio-graphik-web-15.jpeg',
            'vt-portfolio-graphik-web-16.jpeg',
            'vt-portfolio-graphik-web-17.jpeg',
            'vt-portfolio-graphik-web-18.jpeg',
            'vt-portfolio-graphik-web-19.jpeg'
        ];

        const gridContainer = document.getElementById('grid-container');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        // 動態生成網格圖片
        images.forEach(imgName => {
            const imgElement = document.createElement('img');
            imgElement.src = folderPath + imgName;
            
            // 啟用懶加載 (Lazy Loading)
            imgElement.setAttribute('loading', 'lazy'); 
            
            // 綁定點擊放大事件
            imgElement.addEventListener('click', () => {
                lightboxImg.src = imgElement.src; 
                lightbox.classList.add('active'); 
            });

            gridContainer.appendChild(imgElement);
        });

        // 點擊任意處關閉放大圖片
        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });
    </script>
</body>
</html>
