<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Graphik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="inner-body">
    <header class="fixed-header">
        <a href="index.html" class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </a>
        <nav class="nav-menu">
            <div class="current-page">GRAPHIK</div>
            <div class="dropdown-links">
                <a href="photography.html">PHOTOGRAPHY</a>
                <a href="tattoo.html">TATTOO</a>
                <a href="branding.html">BRANDING</a>
                <a href="others.html">OTHERS</a>
                <a href="about.html">ABOUT</a>
            </div>
        </nav>
    </header>
    <main class="graphik-container" id="graphik-list"></main>
    <footer class="fixed-footer">© 2025 Strangeways Apartments. All rights reserved.</footer>
    <script>
        const graphikFolder = 'graphik/';
        const graphikFiles = ['design1.jpg', 'design2.jpg']; // 填入單欄設計照片
        const container = document.getElementById('graphik-list');
        graphikFiles.forEach(fileName => {
            const imgElement = document.createElement('img');
            imgElement.src = graphikFolder + fileName;
            imgElement.onerror = function() { this.style.display = 'none'; };
            container.appendChild(imgElement);
        });
    </script>
</body>
</html>
