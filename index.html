<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">
    
    <!-- 修正 1 & 2：移除了重複貼上的頭部代碼，並補上 </header> 閉合標籤 -->
    <!-- 修正 3：將 class 改為 fixed-header，這樣就能直接共用內頁寫好的 Logo 排版！ -->
    <header class="fixed-header">
        <a href="index.html" class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </a>
    </header>

    <!-- 滿屏幻燈片背景 -->
    <div class="slideshow-container" id="slideshow">
        <div class="slide-img active" id="slide-target"></div>
    </div>
    
    <!-- 暗色視覺遮罩 -->
    <div class="landing-overlay"></div>
    
    <!-- 前景導覽文字內容 -->
    <div class="landing-content">
        <div class="landing-cell">
            <nav class="landing-nav">
                <a href="graphik.html" class="nav-item">GRAPHIK</a>
                <a href="photography.html" class="nav-item">PHOTOGRAPHY</a>
                <a href="tattoo.html" class="nav-item">TATTOO</a>
                <a href="branding.html" class="nav-item">BRANDING</a>
                <a href="others.html" class="nav-item">OTHERS</a>
                <a href="about.html" class="nav-item">ABOUT</a>
            </nav>
        </div>
    </div>

    <!-- 輪播腳本 -->
    <script>
        const photoFolder = 'photography/';
        const imageFiles = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg']; // 記得確保這些照片存在
        let currentImageSrc = '';
        const slideTarget = document.getElementById('slide-target');
        
        function changeRandomBackground() {
            if (imageFiles.length === 0) return;
            let nextImage;
            do {
                const randomIndex = Math.floor(Math.random() * imageFiles.length);
                nextImage = photoFolder + imageFiles[randomIndex];
            } while (nextImage === currentImageSrc && imageFiles.length > 1);
            currentImageSrc = nextImage;
            
            const imgLoader = new Image();
            imgLoader.src = currentImageSrc;
            imgLoader.onload = function() { 
                slideTarget.style.backgroundImage = `url('${currentImageSrc}')`; 
            };
        }
        
        changeRandomBackground();
        setInterval(changeRandomBackground, 2000);
    </script>
</body>
</html>
