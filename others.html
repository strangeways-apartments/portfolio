<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Others | Strangeways Apartments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="photography-body">

    <header class="fixed-header">
        <a href="index.html" class="logo-container">
            <img src="assets/logo.png" alt="Logo">
        </a>
        <nav class="nav-menu">
            <div class="current-page">OTHERS</div>
            <div class="dropdown-links">
                <a href="graphik.html">GRAPHIK</a>
                <a href="photography.html">PHOTOGRAPHY</a>
                <a href="tattoo.html">TATTOO</a>
                <a href="branding.html">BRANDING</a>
                <a href="illustration.html">ILLUSTRATION</a>
                <a href="about.html">ABOUT</a>
            </div>
        </nav>
    </header>

    <!-- 延用 Photography 的 4 欄網格佈局 -->
    <main class="photo-grid" id="photo-container"></main>

    <!-- 點擊放大區塊 -->
    <div class="lightbox" id="lightbox">
        <img src="" id="lightbox-img" alt="Enlarged View">
    </div>

    <footer class="fixed-footer">© 2025 Strangeways Apartments. All rights reserved.</footer>

    <script>
        // 1. 設定檔案路徑
        const folderPath = 'portfolio/others/'; 

        // 2. 匯入 28 個檔案 (包含圖片與影片)
        const files = [
            '22.JPG',
            'IMG_3162.jpg',
            'IMG_3163.jpg',
            'Untitledsd.png',
            'furn-Artboard 2.webp',
            'furn-Artboard 27.webp',
            'mai2.mov',
            'other1.jpg',
            'other10.jpg',
            'other11.jpg',
            'other12.jpg',
            'other13.jpg',
            'other14.jpg',
            'other15.jpg',
            'other16.jpg',
            'other17.jpg',
            'other18.JPG',
            'other19.jpg',
            'other2.jpg',
            'other20.jpg',
            'other21.jpg',
            'other3.jpg',
            'other4.jpg',
            'other5.jpg',
            'other6.jpg',
            'other7.png',
            'other8.jpg',
            'other9.png'
        ];

        const container = document.getElementById('photo-container');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        // 批次生成圖片與影片
        files.forEach(file => {
            const fileExtension = file.split('.').pop().toLowerCase();
            
            // 判斷是否為影片格式
            if (fileExtension === 'mov' || fileExtension === 'mp4') {
                const video = document.createElement('video');
                // 處理檔名空白
                video.src = folderPath + file.replace(/ /g, '%20');
                // 設定影片為無聲、自動播放且循環，當作動態磚塊
                video.setAttribute('autoplay', 'true');
                video.setAttribute('loop', 'true');
                video.setAttribute('muted', 'true');
                video.setAttribute('playsinline', 'true');
                // 強制套用與照片相同的 CSS 長寬比例
                video.style.width = '100%';
                video.style.aspectRatio = '1 / 1';
                video.style.objectFit = 'cover';
                video.style.display = 'block';
                
                container.appendChild(video);
            } else {
                // 一般圖片處理
                const img = document.createElement('img');
                // 處理檔名空白，避免瀏覽器找不到檔案
                img.src = folderPath + file.replace(/ /g, '%20');
                img.setAttribute('loading', 'lazy'); 
                
                // 綁定點擊放大事件
                img.addEventListener('click', () => {
                    lightboxImg.src = img.src;
                    lightbox.classList.add('active');
                });
                
                container.appendChild(img);
            }
        });

        // 點擊任意處關閉放大圖片
        lightbox.addEventListener('click', () => lightbox.classList.remove('active'));
    </script>
</body>
</html>
